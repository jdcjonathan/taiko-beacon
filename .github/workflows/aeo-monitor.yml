name: AEO Citation Monitor
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install openai anthropic requests pandas
      - run: python packages/aeo-monitor/monitor.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Commit results
        run: |
          git config user.name "taiko-beacon-bot"
          git config user.email "beacon@taiko.xyz"
          git add packages/aeo-monitor/results/ || true
          git diff --staged --quiet || (git commit -m "chore: weekly AEO monitor results $(date +%Y-%m-%d)" && git push)
